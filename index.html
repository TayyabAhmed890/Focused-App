<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focused. App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav>
        <h1 id="logo"><a href="/">Focused.</a></h1>
        <ul class="nav-links" id="links">
          <li><a href="/setsession.html">Set Session</a></li>
          <li><a href="/session.html">Sessions</a></li>
        </ul>
        <span id="menu-icon">
          <img src="menus.png" alt="menu-icon" height="30px">
        </span>
      </nav>
    </header>
    <main>
      <section id="main-container">
        <div id="timer-dialog">
          <h1 id="time" class="timer"></h1>
          </div>
          <div id="btn-section">
            <button id="time-start" class="btn">Start</button>
            <button id="time-stop" class="btn">Stop</button> 
            <button id="time-reset" class="btn">Reset</button> 
          </div>
      </section>
    </main>
    <footer></footer>
    <script src="script.js"></script>
    <script src="toggle.js"></script>
  </body>
